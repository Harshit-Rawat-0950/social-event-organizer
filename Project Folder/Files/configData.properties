# Application details
app.name=Event Management System
app.version=1.0
app.mode=dev 
app.language=English
app.devStartupDelayMs=5000
app.delay=500
# Login settings
login.maxAttempts=3
login.sessionTimeout=30
login.defaultRole=user

# File storage paths
Files.users=Files/users.txt
Files.events=Files/events.txt
Files.invites=Files/invite.txt
Files.friends=Files/friends.txt
Files.password=Files/friends.txt
Files.userData=Files/userData.txt

# Event settings
event.defaultType=Public
event.defaultCategory=General
event.maxCapacity=500
event.bookingCutoffHours=24
event.allowCancellation=true